<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaviVoice</title>
  <style>
    body {
      background: #000;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }
    #speakBtn {
      background: #007AFF;
      color: white;
      font-size: 2rem;
      padding: 40px 60px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 30px;
      width: 100%;
      max-width: 400px;
    }
    #speakBtn:disabled {
      background: #444;
      cursor: not-allowed;
    }
    #status {
      font-size: 1rem;
      color: #aaa;
      text-align: left;
      width: 100%;
      max-width: 400px;
      line-height: 2;
      white-space: pre-wrap;
    }
    #compassStatus {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <button id="speakBtn">読み上げ開始</button>
  <p id="compassStatus">コンパス: 未取得</p>
  <p id="status">ボタンを押してください</p>

  <script>

    const btn = document.getElementById('speakBtn');
    const status = document.getElementById('status');
    const compassStatus = document.getElementById('compassStatus');

    // 現在のコンパス方位（北=0, 東=90, 南=180, 西=270）
    let myHeading = null;

    // ── ボタンを押したときの処理 ──
    btn.addEventListener('click', async function () {
      btn.disabled = true;
      setStatus('準備中...');

      // ① iOSのSafari対策: タップ直後に音声を初期化する（これをしないと読み上げない）
      const unlock = new SpeechSynthesisUtterance('');
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(unlock);

      // ② コンパスの許可を取得（GPS headingが使えない場合の保険）
      await requestCompass();

      speak('現在地と進行方向を取得しています。少し歩いてください。');
      setStatus('現在地と進行方向を取得中...\n少し歩くと方向が確定します');

      // ③ watchPositionで歩行方向（GPS heading）を取得する
      //    コンパスより正確。動いているときだけ取得できる
      await getGPSHeading();

      navigator.geolocation.getCurrentPosition(
        async function (position) {
          const myLat = position.coords.latitude;
          const myLng = position.coords.longitude;

          // GPS移動方向が取れていればそちらを使う（最優先）
          if (position.coords.heading && !isNaN(position.coords.heading)) {
            myHeading = position.coords.heading;
            compassStatus.textContent = 'GPS方向: 取得済み（高精度）';
          }

          setStatus('周辺情報を検索中...');
          speak('周辺情報を検索しています');

          try {
            const { landmarks, places } = await getNearbyPlaces(myLat, myLng);

            let allText = '';
            let displayText = '';

            // ── 歩行目印（交差点・横断歩道）を先に読み上げる ──
            if (landmarks.length > 0) {
              const landmarkParts = landmarks
                .map(l => {
                  const dist = getDistance(myLat, myLng, l.lat, l.lon);
                  const bearing = getBearing(myLat, myLng, l.lat, l.lon);
                  const pos = formatPosition(bearing);
                  return { label: l.label, dist, pos };
                })
                .sort((a, b) => a.dist - b.dist); // 近い順に並べる

              // 距離を最初に読む（Soundscapeの課題を解決）
              const landmarkText = landmarkParts
                .map(l => `約${l.dist}メートル先に${l.label}。${l.pos}。`)
                .join('');

              allText += '歩行目印をお知らせします。' + landmarkText;
              displayText += '【歩行目印】\n' + landmarkParts
                .map(l => `${l.dist}m先 ${l.pos} ／ ${l.label}`)
                .join('\n') + '\n\n';
            }

            // ── 周辺施設・店舗を読み上げる ──
            if (places.length === 0) {
              allText += '周辺に施設が見つかりませんでした。';
              displayText += '施設情報なし';
            } else {
              const results = places
                .map(p => {
                  const name = p.tags['name:ja'] || p.tags.name;
                  const placeLat = p.center ? p.center.lat : p.lat;
                  const placeLng = p.center ? p.center.lon : p.lon;
                  if (!name || !placeLat || !placeLng) return null;

                  const dist = getDistance(myLat, myLng, placeLat, placeLng);
                  const bearing = getBearing(myLat, myLng, placeLat, placeLng);
                  const category = getCategory(p.tags);
                  const pos = formatPosition(bearing);
                  return { name, category, dist, pos };
                })
                .filter(Boolean)
                .sort((a, b) => a.dist - b.dist) // 近い順
                .slice(0, 10);

              const intro = `半径500メートルに${results.length}件あります。近い順にお知らせします。`;
              // 句点で区切って1情報ずつ聞きやすくする
              const details = results
                .map(r => `${r.category}の${r.name}。${r.pos}。${r.dist}メートル。`)
                .join('');

              allText += intro + details + '以上です。';
              displayText += '【周辺の場所】\n' + results
                .map(r => `${r.dist}m ${r.pos} ／ ${r.category}：${r.name}`)
                .join('\n');
            }

            speak(allText);
            setStatus(displayText);

          } catch (e) {
            speak('情報の取得に失敗しました');
            setStatus('エラー: ' + e.message);
          }

          btn.disabled = false;
        },
        function (err) {
          speak('現在地の取得に失敗しました');
          setStatus('位置情報エラー: ' + err.message);
          btn.disabled = false;
        }
      );
    });

    // ── 歩行方向をGPSから取得する（コンパスより正確）──
    function getGPSHeading() {
      return new Promise((resolve) => {
        let watchId;
        let attempts = 0;

        watchId = navigator.geolocation.watchPosition(
          function (position) {
            const h = position.coords.heading;
            attempts++;

            // headingが有効な値で取れたら確定
            if (h !== null && !isNaN(h) && h >= 0) {
              myHeading = h;
              compassStatus.textContent = 'GPS方向: 取得済み（高精度）';
              navigator.geolocation.clearWatch(watchId);
              resolve();
            }

            // 5回試してもGPS headingが取れなければコンパスで代用
            if (attempts >= 5) {
              navigator.geolocation.clearWatch(watchId);
              if (myHeading === null) {
                compassStatus.textContent = '方向: コンパスで代用（精度は低め）';
              }
              resolve();
            }
          },
          function () {
            navigator.geolocation.clearWatch(watchId);
            resolve();
          },
          { enableHighAccuracy: true }
        );

        // 8秒でタイムアウト
        setTimeout(() => {
          navigator.geolocation.clearWatch(watchId);
          if (myHeading === null) {
            compassStatus.textContent = '方向: 取得できませんでした（東西南北で読み上げます）';
          }
          resolve();
        }, 8000);
      });
    }

    // ── コンパスの許可を取得してheadingを監視する ──
    async function requestCompass() {
      try {
        // iOS 13+ はユーザー操作のタイミングでpermissionリクエストが必要
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') {
            compassStatus.textContent = 'コンパス: 不許可（方角は東西南北で読み上げます）';
            return;
          }
        }

        // コンパスデータを1回取得する
        await new Promise((resolve) => {
          const handler = (e) => {
            // iOSは webkitCompassHeading で北からの角度が取れる
            if (e.webkitCompassHeading != null) {
              myHeading = e.webkitCompassHeading;
              compassStatus.textContent = 'コンパス: 取得済み（クロックポジションで読み上げ）';
            } else if (e.alpha != null) {
              myHeading = (360 - e.alpha) % 360;
              compassStatus.textContent = 'コンパス: 取得済み（クロックポジションで読み上げ）';
            }
            window.removeEventListener('deviceorientation', handler);
            window.removeEventListener('deviceorientationabsolute', handler);
            resolve();
          };
          window.addEventListener('deviceorientationabsolute', handler);
          window.addEventListener('deviceorientation', handler);
          // 3秒でタイムアウト
          setTimeout(() => {
            window.removeEventListener('deviceorientation', handler);
            window.removeEventListener('deviceorientationabsolute', handler);
            if (myHeading === null) {
              compassStatus.textContent = 'コンパス: 未対応（方角は東西南北で読み上げます）';
            }
            resolve();
          }, 3000);
        });
      } catch (e) {
        compassStatus.textContent = 'コンパス: エラー';
      }
    }

    // ── 方位をクロックポジションまたは東西南北で返す ──
    function formatPosition(bearing) {
      if (myHeading !== null) {
        // クロックポジション: 自分の向きを12時として相対的な時計位置を計算
        const relative = (bearing - myHeading + 360) % 360;
        const hour = Math.round(relative / 30) % 12;
        return `${hour === 0 ? 12 : hour}時の方向`;
      } else {
        // コンパスが使えない場合は東西南北で返す
        return bearingToDirection(bearing) + '方向';
      }
    }

    // ── 2点間の角度（北=0, 東=90）を計算する ──
    function getBearing(lat1, lng1, lat2, lng2) {
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const lat1R = lat1 * Math.PI / 180;
      const lat2R = lat2 * Math.PI / 180;
      const y = Math.sin(dLng) * Math.cos(lat2R);
      const x = Math.cos(lat1R) * Math.sin(lat2R) - Math.sin(lat1R) * Math.cos(lat2R) * Math.cos(dLng);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    // ── 角度を8方位の文字に変換する ──
    function bearingToDirection(bearing) {
      if (bearing < 22.5  || bearing >= 337.5) return '北';
      if (bearing < 67.5)  return '北東';
      if (bearing < 112.5) return '東';
      if (bearing < 157.5) return '南東';
      if (bearing < 202.5) return '南';
      if (bearing < 247.5) return '南西';
      if (bearing < 292.5) return '西';
      return '北西';
    }

    // ── 2点間の距離をメートルで計算する ──
    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return Math.round(6371000 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    // ── タグからカテゴリ名（日本語）を返す ──
    function getCategory(tags) {
      const amenityMap = {
        convenience:       'コンビニ',
        supermarket:       'スーパー',
        pharmacy:          '薬局',
        hospital:          '病院',
        clinic:            'クリニック',
        doctors:           'クリニック',
        dentist:           '歯科',
        restaurant:        'レストラン',
        fast_food:         'ファストフード',
        cafe:              'カフェ',
        bar:               'バー',
        bank:              '銀行',
        atm:               'ATM',
        post_office:       '郵便局',
        school:            '学校',
        university:        '大学',
        kindergarten:      '幼稚園',
        bus_stop:          'バス停',
        fuel:              'ガソリンスタンド',
        parking:           '駐車場',
        police:            '警察署',
        fire_station:      '消防署',
        library:           '図書館',
        toilets:           'トイレ',
        place_of_worship:  '寺社',
        community_centre:  'コミュニティセンター',
      };
      const shopMap = {
        clothes:           '衣料品店',
        electronics:       '家電量販店',
        bakery:            'パン屋',
        books:             '本屋',
        hairdresser:       '美容院',
        optician:          '眼鏡店',
        florist:           '花屋',
        sports:            'スポーツ用品店',
        mobile_phone:      '携帯電話ショップ',
        department_store:  'デパート',
        hardware:          'ホームセンター',
        convenience:       'コンビニ',
        supermarket:       'スーパー',
        pharmacy:          '薬局',
        variety_store:     '百円ショップ',
      };
      if (tags.amenity && amenityMap[tags.amenity]) return amenityMap[tags.amenity];
      if (tags.shop    && shopMap[tags.shop])        return shopMap[tags.shop];
      if (tags.amenity) return '施設';
      if (tags.shop)    return '店舗';
      return '建物';
    }

    // ── 周辺情報をOpenStreetMapから取得する ──
    async function getNearbyPlaces(lat, lng) {
      const radius = 500;
      // 交差点の検索範囲は300mに広げる（歩行判断に重要なため）
      const landmarkRadius = 300;
      const query = `
        [out:json][timeout:20];
        (
          node(around:${radius},${lat},${lng})[amenity][name];
          node(around:${radius},${lat},${lng})[shop][name];
          way(around:${radius},${lat},${lng})[amenity][name];
          way(around:${radius},${lat},${lng})[shop][name];
          way(around:${radius},${lat},${lng})[building][name];
          node(around:${landmarkRadius},${lat},${lng})[highway=traffic_signals];
          node(around:${landmarkRadius},${lat},${lng})[highway=crossing];
          node(around:${landmarkRadius},${lat},${lng})[highway=stop];
          node(around:${landmarkRadius},${lat},${lng})[junction=yes];
        );
        out center 40;
      `;

      const servers = [
        'https://overpass-api.de/api/interpreter',
        'https://overpass.kumi.systems/api/interpreter'
      ];

      for (const server of servers) {
        try {
          const res = await fetch(server + '?data=' + encodeURIComponent(query));
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();

          // 歩行目印のラベルを決める
          const landmarkTags = ['traffic_signals', 'crossing', 'stop', 'yes'];
          const landmarks = data.elements
            .filter(e => e.tags && (
              e.tags.highway === 'traffic_signals' ||
              e.tags.highway === 'crossing' ||
              e.tags.highway === 'stop' ||
              e.tags.junction === 'yes'
            ))
            .map(e => ({
              lat: e.lat,
              lon: e.lon,
              label: getLandmarkLabel(e.tags)
            }));

          const places = data.elements
            .filter(e => e.tags && !e.tags.highway && !e.tags.junction && (e.tags.name || e.tags['name:ja']));

          return { landmarks, places };
        } catch (e) {
          continue;
        }
      }
      throw new Error('サーバーへの接続に失敗しました');
    }

    // ── 歩行目印のラベルを日本語で返す ──
    function getLandmarkLabel(tags) {
      if (tags.highway === 'traffic_signals') return '信号のある交差点';
      if (tags.highway === 'crossing') {
        if (tags.crossing === 'traffic_signals') return '信号のある横断歩道';
        return '横断歩道';
      }
      if (tags.highway === 'stop')  return '一時停止の交差点';
      if (tags.junction === 'yes')  return '交差点';
      return '交差点';
    }

    // ── テキストを音声で読み上げる ──
    function speak(text) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance();
      msg.text = text;
      msg.lang = 'ja-JP';
      msg.rate = 0.9;
      window.speechSynthesis.speak(msg);
    }

    // ── 画面のステータスを更新する ──
    function setStatus(text) {
      status.textContent = text;
    }

  </script>
</body>
</html>
